name: Gold Intelligence Bot V2

permissions:
  contents: write

on:
  workflow_dispatch:

  schedule:
    - cron: '0 22 * * *'      # 07:00 JST: Daily Gold Plan
    - cron: '0 0,4,8 * * *'   # 09:00 / 13:00 / 17:00 JST: Gold News Update
    - cron: '*/15 * * * *'    # Check lịch tin mỗi 15 phút

jobs:
  daily-bias:
    if: github.event.schedule == '0 22 * * *'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Daily Gold Bias
        run: python main.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: bias

      - name: Save State
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add sent.json
          git commit -m "Update sent state" || echo "No changes"
          git pull --rebase || true
          git push || true

  gold-news:
    if: github.event.schedule == '0 0,4,8 * * *'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Gold News Update
        run: python main.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: news

      - name: Save State
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add sent.json
          git commit -m "Update sent state" || echo "No changes"
          git pull --rebase || true
          git push || true

  news-check:
    if: github.event.schedule == '*/15 * * * *'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Check Economic News
        run: python main.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: check

      - name: Save State
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add sent.json
          git commit -m "Update sent state" || echo "No changes"
          git pull --rebase || true
          git push || true

  manual-test:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Manual Test
        run: python main.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: test
