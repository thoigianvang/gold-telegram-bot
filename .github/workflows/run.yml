name: Gold News Bot

on:
  schedule:
    # TEST tự động: chạy mỗi 5 phút để kiểm tra
    - cron: '*/5 * * * *'

    # 07:00 sáng Nhật JST: gửi lịch tin vàng hôm nay
    - cron: '0 22 * * 0-4'

    # Thứ 2-6: kiểm tra tin sắp ra
    - cron: '*/30 * * * 1-5'

    # Thứ 2-6: kiểm tra Actual sau tin
    - cron: '*/15 * * * 1-5'

  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - run: python main.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: daily

  warning:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - run: python main.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: warning

  actual:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - run: python main.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: actual
