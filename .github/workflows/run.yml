name: Gold Intelligence Bot V2

permissions:
  contents: write

on:
  workflow_dispatch:

  schedule:
    - cron: '*/15 * * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Run Bot Auto
        run: python main.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: auto

      - name: Save State
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add sent.json
          git commit -m "Update sent state" || echo "No changes"
          git pull --rebase || true
          git push || true
